name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build admin
        run: npm run build:admin

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build
